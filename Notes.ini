[Rainmeter]
Update=1000
DynamicWindowSize=1
AccurateText=1
Draggable=1

[Metadata]
Name=Notes Viewer
Author=Antigravity
Information=Shows text notes with arrow navigation and notepad integration.
Version=1.0

[Variables]
; --- CONFIGURATION ---
NotesPath="X:\1 A Ongoing\1 C Dairy (Quick Tought)\1 QuickThought\Computer"
Subfolders=1
CurrentFile=""

; --- DISPLAY CONFIGURATION ---
Width=600
Height=500
Padding=20
ItemPadding=10

; Colors (VisionBoard Inspired)
MainBG=0,0,0,140
ControlBG=0,0,0,180
AccentColor=255,255,255
TextColor=255,255,255,200
DimColor=255,255,255,100

FontBody=Segoe UI
FontTitleSize=16
FontTextSize=12

; --- MEASURES ---

[MeasureLua]
Measure=Script
ScriptFile=Notes.lua
UpdateDivider=1

; Use RunCommand to list files
[MeasureFileList]
Measure=Plugin
Plugin=RunCommand
Parameter=powershell.exe -NoProfile -ExecutionPolicy Bypass -Command "'#NotesPath#'.Split(';') | ForEach-Object { if (Test-Path $_) { Get-ChildItem -Path $_ -Filter *.txt -Recurse:$([bool]#Subfolders#) } } | Select-Object -ExpandProperty FullName"
OutputType=ANSI
FinishAction=[!CommandMeasure MeasureLua "ParseFileListFromMeasure()"]
UpdateDivider=-1

; --- STYLES ---

[StyleArrow]
FontFace=#FontBody#
FontSize=18
FontColor=#AccentColor#
SolidColor=#ControlBG#
Padding=8,15,8,15
StringAlign=CenterCenter
AntiAlias=1
DynamicVariables=1
Group=Arrows
Hidden=1
MouseOverAction=[!SetOption #CURRENTSECTION# SolidColor "0,0,0,255"][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# SolidColor "#ControlBG#"][!UpdateMeter #CURRENTSECTION#][!Redraw]

; --- METERS ---

; Hover Container (Handles showing/hiding arrows)
[MeterContainer]
Meter=Image
W=#Width#
H=#Height#
SolidColor=0,0,0,1
MouseOverAction=[!ShowMeterGroup Arrows][!Redraw]
MouseLeaveAction=[!HideMeterGroup Arrows][!Redraw]

; Background
[MeterBG]
Meter=Shape
Shape=Rectangle 0,0,#Width#,#Height# | Fill Color #MainBG# | Stroke Width 0
DynamicVariables=1

; Title / Filename (Centered at top)
[MeterTitle]
Meter=String
X=(#Width# / 2)
Y=(#Padding# + 5)
W=(#Width# - #Padding#*4)
FontFace=#FontBody#
FontSize=#FontTitleSize#
FontColor=#AccentColor#
StringAlign=CenterTop
StringStyle=Bold
Text="Loading..."
AntiAlias=1
ClipString=1
FontEffectColor=0,0,0,100
StringEffect=Shadow

; Divider
[MeterDivider]
Meter=Shape
Shape=Rectangle #Padding#,(#Padding# + 40),(#Width# - #Padding#*2),1 | Fill Color 255,255,255,40 | Stroke Width 0
DynamicVariables=1

; Navigation - Previous
[MeterPrev]
Meter=String
MeterStyle=StyleArrow
X=(#Padding# + 15)
Y=(#Height# / 2)
Text=<
LeftMouseUpAction=[!CommandMeasure MeasureLua "Previous()"]

; Navigation - Next
[MeterNext]
Meter=String
MeterStyle=StyleArrow
X=(#Width# - #Padding# - 15)
Y=(#Height# / 2)
Text=>
LeftMouseUpAction=[!CommandMeasure MeasureLua "Next()"]

; Note Content
[MeterNoteText]
Meter=String
X=(#Padding# + 10)
Y=(#Padding# + 60)
W=(#Width# - (#Padding# + 10)*2)
H=(#Height# - #Padding#*2 - 80)
SolidColor=0,0,0,1
FontFace=#FontBody#
FontSize=#FontTextSize#
FontColor=#TextColor#
Text="Reading files..."
WordWrap=1
AntiAlias=1
ClipString=1
LeftMouseDoubleClickAction=[!CommandMeasure MeasureLua "OpenInNotepad()"]
ToolTipText="Double-click to open in Notepad"

; Footer Hint (Centered at bottom)
[MeterFooter]
Meter=String
X=(#Width# / 2)
Y=(#Height# - #Padding#)
StringAlign=CenterBottom
FontFace=#FontBody#
FontSize=9
FontColor=#DimColor#
Text="DOUBLE-CLICK TO EDIT"
AntiAlias=1
DynamicVariables=1
